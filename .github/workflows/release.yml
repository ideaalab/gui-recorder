name: Release

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-zip:
    name: Build release zip
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Sync manifest version with tag
        run: |
          version="${{ steps.version.outputs.version }}"
          version="${version#v}"
          jq --arg v "$version" '.version = $v' \
            custom_components/gui_recorder/manifest.json > manifest.tmp
          mv manifest.tmp custom_components/gui_recorder/manifest.json

      - name: Create zip
        run: |
          cd custom_components/gui_recorder
          zip -r "${{ github.workspace }}/gui_recorder.zip" .

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: gui_recorder.zip
